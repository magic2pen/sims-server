<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMS Portal — Assignments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="tripura_emblem.png" alt="" onerror="this.style.display='none'">
      <div>
        <div class="name">SIMS Portal</div>
        <div class="sub">West Tripura</div>
      </div>
    </div>
    <nav>
      <a href="dashboard.html">Inspections</a>
      <a href="reports.html" class="admin-only-nav" style="display:none;">Reports</a>
      <a href="attendance-reports.html" class="admin-only-nav" style="display:none;">Attendance &amp; Academics</a>
      <a href="assignments.html" class="admin-only-nav active" style="display:none;">Assignments</a>
      <a href="admins.html" class="admin-only-nav" style="display:none;">Admins</a>
      <a href="officers.html" class="admin-only-nav" style="display:none;">Officers</a>
      <a href="questionnaire.html" class="dm-only-nav" style="display:none;">Questionnaire</a>
      <a href="profile.html" class="admin-only-nav" style="display:none;">My Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="officer-name" id="sidebarOfficerName">—</div>
      <div class="officer-role" id="sidebarOfficerRole">—</div>
      <button id="sidebarLogoutBtn">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <h1 class="page-title">Assignments</h1>
    <p class="page-subtitle">Assign specific schools to officers within your jurisdiction, with a due date.</p>

    <div class="card" style="margin-bottom:24px;">
      <h2 style="font-size:15px; margin:0 0 16px;">Assign a School</h2>
      <div id="createError" class="login-error-inline" style="display:none;"></div>
      <form id="createForm">
        <div class="form-grid">
          <div class="field">
            <label>Officer</label>
            <select id="fOfficer" required></select>
          </div>
          <div class="field">
            <label>School</label>
            <select id="fSchool" required></select>
          </div>
          <div class="field">
            <label>Due Date</label>
            <input id="fDueDate" type="date">
          </div>
          <div class="field">
            <label>Notes (optional)</label>
            <input id="fNotes" placeholder="e.g. Follow-up on last quarter's toilet issue">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="createBtn">Assign School</button>
      </form>
    </div>

    <div class="filters">
      <select id="statusFilter">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
      </select>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div id="listContainer">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </main>
</div>

<style>
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; margin-bottom: 18px; }
  @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
  .field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  }
  .login-error-inline { background: var(--gov-red-bg); color: var(--gov-red); font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
  .assign-row {
    display: grid;
    grid-template-columns: 1.3fr 1.1fr 0.9fr 1fr 0.8fr;
    gap: 10px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: center;
  }
  .assign-row:last-child { border-bottom: none; }
  .assign-row.header { font-weight: 700; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; background: #FAFBFF; }
  .status-pill { display:inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .status-pending { background: var(--gov-amber-bg); color: var(--gov-amber); }
  .status-completed { background: var(--gov-green-bg); color: var(--gov-green); }
  .overdue { color: var(--gov-red); font-weight: 700; }
</style>

<script src="portal.js"></script>
<script>
  requireAdmin();
  renderSidebarFooter();

  async function loadFormOptions() {
    const officerSel = document.getElementById('fOfficer');
    const schoolSel = document.getElementById('fSchool');
    try {
      const officers = await apiGet('/api/officers?status=active');
      officerSel.innerHTML = officers.length
        ? officers.map(o => `<option value="${o.id}">${escapeHtml(o.name)} — ${escapeHtml(o.designation || '')}</option>`).join('')
        : '<option value="">No officers in your jurisdiction yet</option>';
    } catch (err) {
      officerSel.innerHTML = `<option value="">Couldn't load officers</option>`;
    }
    try {
      const schools = await apiGet('/api/schools');
      schoolSel.innerHTML = schools.length
        ? schools.map(s => `<option value="${s.id}">${escapeHtml(s.name)} — ${escapeHtml(s.block)}</option>`).join('')
        : '<option value="">No schools available</option>';
    } catch (err) {
      schoolSel.innerHTML = `<option value="">Couldn't load schools</option>`;
    }
  }

  let allAssignments = [];

  function isOverdue(a) {
    if (a.status !== 'pending' || !a.due_date) return false;
    return new Date(a.due_date) < new Date(new Date().toDateString());
  }

  function renderList() {
    const statusFilter = document.getElementById('statusFilter').value;
    const filtered = allAssignments.filter(a => !statusFilter || a.status === statusFilter);
    const container = document.getElementById('listContainer');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">No assignments yet.</div>';
      return;
    }

    const header = `
      <div class="assign-row header">
        <div>School</div><div>Officer</div><div>Due Date</div><div>Notes</div><div>Status</div>
      </div>`;
    const rows = filtered.map(a => {
      const overdue = isOverdue(a);
      return `
        <div class="assign-row">
          <div>
            <div>${escapeHtml(a.school_name || 'Unknown school')}</div>
            <div style="font-size:11px;color:var(--text-secondary);">${escapeHtml(a.block || '')}, ${escapeHtml(a.district || '')}</div>
          </div>
          <div>${escapeHtml(a.officer_name || 'Unknown officer')}</div>
          <div class="${overdue ? 'overdue' : ''} data">${a.due_date ? formatDate(a.due_date) : '—'}${overdue ? ' (overdue)' : ''}</div>
          <div style="font-size:12px;color:var(--text-secondary);">${escapeHtml(a.notes || '—')}</div>
          <div><span class="status-pill status-${a.status}">${escapeHtml(a.status)}</span></div>
        </div>`;
    }).join('');
    container.innerHTML = header + rows;
  }

  async function loadAssignments() {
    try {
      allAssignments = await apiGet('/api/assignments');
      renderList();
    } catch (err) {
      document.getElementById('listContainer').innerHTML = `<div class="empty-state">Couldn't load assignments: ${err.message}</div>`;
    }
  }

  document.getElementById('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('createError');
    const btn = document.getElementById('createBtn');
    errorBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Assigning...';
    try {
      await apiPost('/api/assignments', {
        officerId: parseInt(document.getElementById('fOfficer').value, 10),
        schoolId: parseInt(document.getElementById('fSchool').value, 10),
        dueDate: document.getElementById('fDueDate').value || null,
        notes: document.getElementById('fNotes').value
      });
      document.getElementById('createForm').reset();
      loadAssignments();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Assign School';
    }
  });

  document.getElementById('statusFilter').addEventListener('change', renderList);

  loadFormOptions();
  loadAssignments();
</script>
</body>
</html>
