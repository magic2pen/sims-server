<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMS Portal — Inspection Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
  .detail-header h1 { font-size: 22px; margin: 0 0 4px; }
  .detail-header .meta { color: var(--text-secondary); font-size: 14px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .info-item .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 3px; }
  .info-item .value { font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="tripura_emblem.png" alt="" onerror="this.style.display='none'">
      <div>
        <div class="name">SIMS Portal</div>
        <div class="sub">West Tripura</div>
      </div>
    </div>
    <nav>
      <a href="dashboard.html">Inspections</a>
      <a href="reports.html" class="admin-only-nav" style="display:none;">Reports</a>
      <a href="assignments.html" class="admin-only-nav" style="display:none;">Assignments</a>
      <a href="admins.html" class="admin-only-nav" style="display:none;">Admins</a>
      <a href="officers.html" class="admin-only-nav" style="display:none;">Officers</a>
    </nav>
    <div class="sidebar-footer">
      <div class="officer-name" id="sidebarOfficerName">—</div>
      <div class="officer-role" id="sidebarOfficerRole">—</div>
      <button id="sidebarLogoutBtn">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <a href="dashboard.html" class="back-link">&larr; Back to Inspections</a>
    <div id="content">
      <div class="empty-state">Loading inspection...</div>
    </div>
  </main>
</div>

<script src="portal.js"></script>
<script>
  requireLogin();
  renderSidebarFooter();

  function base64ToBlobUrl(base64, mime) {
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], { type: mime });
    return URL.createObjectURL(blob);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  async function loadDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const content = document.getElementById('content');

    if (!id) {
      content.innerHTML = '<div class="empty-state">No inspection specified.</div>';
      return;
    }

    try {
      const insp = await apiGet(`/api/inspections/${id}`);

      let pdfSection = '<p style="color:var(--text-secondary); font-size:13px;">No PDF report was attached to this inspection.</p>';
      if (insp.pdf_base64) {
        const pdfUrl = base64ToBlobUrl(insp.pdf_base64, 'application/pdf');
        pdfSection = `
          <a class="btn btn-primary" href="${pdfUrl}" target="_blank" rel="noopener">
            View / Download PDF Report
          </a>
        `;
      }

      content.innerHTML = `
        <div class="card">
          <div class="detail-header">
            <div>
              <h1>${escapeHtml(insp.school_name)}</h1>
              <div class="meta">${escapeHtml(insp.block || '')}, ${escapeHtml(insp.district || '')}</div>
            </div>
            <span class="grade-badge ${gradeClass(insp.overall_grade)}" style="font-size:16px; padding:6px 16px;">
              ${insp.overall_grade || 'Not graded'}
            </span>
          </div>

          <div class="info-grid">
            <div class="info-item">
              <div class="label">Inspecting Officer</div>
              <div class="value">${escapeHtml(insp.officer_name || 'Unknown')}</div>
            </div>
            <div class="info-item">
              <div class="label">Designation</div>
              <div class="value">${escapeHtml(insp.officer_designation || '—')}</div>
            </div>
            <div class="info-item">
              <div class="label">Inspection Date &amp; Time</div>
              <div class="value data">${escapeHtml(insp.inspection_datetime || '—')}</div>
            </div>
            <div class="info-item">
              <div class="label">Uploaded</div>
              <div class="value data">${formatDate(insp.uploaded_at)}</div>
            </div>
          </div>

          ${pdfSection}
        </div>

        <div class="card" style="margin-top:16px;">
          <p style="color:var(--text-secondary); font-size:13px; margin:0;">
            A full section-by-section view (matching the mobile app's Review screen) is
            planned for here — for now, the PDF report above contains the complete
            questionnaire responses and photos.
          </p>
        </div>
      `;
    } catch (err) {
      content.innerHTML = `<div class="empty-state">Couldn't load this inspection: ${err.message}</div>`;
    }
  }

  loadDetail();
</script>
</body>
</html>
